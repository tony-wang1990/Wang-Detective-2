server:
  port: ${SERVER_PORT:9527}
  address: ${SERVER_ADDRESS:0.0.0.0}

# --------------------------------------- 用户自定义修改项 ------------------------------------
# ⚠️ 请使用环境变量配置敏感信息，不要在此处硬编码！
# web登录管理员账号密码（从环境变量读取）
web:
  account: ${ADMIN_USERNAME:${WEB_ACCOUNT:admin}}
  password: ${ADMIN_PASSWORD:${WEB_PASSWORD:admin123456}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

ops:
  ssh:
    secret-key: ${OPS_SSH_SECRET_KEY:${ADMIN_PASSWORD:${WEB_PASSWORD:admin123456}}}

# Telegram Bot 配置（必须使用环境变量）
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:${BOT_TOKEN:}}
    chat-id: ${TELEGRAM_BOT_CHAT_ID:${TELEGRAM_CHAT_ID:${TG_CHAT_ID:}}}
    username: ${TELEGRAM_BOT_USERNAME:king_detective_bot}
# --------------------------------------- 用户自定义修改项 ------------------------------------

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: ${DB_URL:jdbc:sqlite:/app/king-detective/data/king-detective.db}
  servlet:
    multipart:
      max-file-size: ${SFTP_UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${SFTP_UPLOAD_MAX_REQUEST_SIZE:50MB}
  sql:
    init:
      mode: always
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
#          model: deepseek-ai/DeepSeek-R1-0528-Qwen3-8B
          model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

mybatis-plus:
  mapper-locations: classpath*:com/tony/kingdetective/mapper/xml/*.xml

logging:
  pattern:
    # console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %msg%n"
  level:
    com.oracle.bmc: error
    c.o.b.h.c.j: error

# 密钥文件存放目录（如果是docker部署则不用修改）
oci-cfg:
  boot-broadcast-url: https://backend.king-detective.de5.net/api/boot
  key-dir-path: /app/king-detective/keys
#  key-dir-path: C:\\Users\\yatao\\Desktop

# 实例创建配置
instance-creation:
  # 抢机重试间隔（秒）- 可自定义，例如改成30秒、60秒等
  retry-interval-seconds: 80

# feat #17: 定时自动备份配置
king-detective:
  backup:
    # 是否开启定时自动备份（true=开启，false=关闭）
    auto-enabled: ${AUTO_BACKUP_ENABLED:false}
    # 备份 Cron 表达式（默认每天凌晨3点执行）
    cron: ${AUTO_BACKUP_CRON:0 0 3 * * ?}
    # 备份加密密码（建议通过环境变量配置）
    password: ${AUTO_BACKUP_PASSWORD:}
