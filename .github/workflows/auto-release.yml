name: Auto Release and Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  auto-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Release verification
        shell: bash
        run: RUN_SHELLCHECK=0 RUN_FRONTEND=1 RUN_MAVEN=1 bash scripts/verify-release.sh
      
      - name: Get version from pom.xml
        id: get_version
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "current_version=$version" >> $GITHUB_OUTPUT
          echo "Current version from pom.xml: $version"
      
      - name: Calculate new version
        id: calc_version
        run: |
          current_version="${{ steps.get_version.outputs.current_version }}"
          # Split semantic version: 4.1.1 -> major=4, minor=1, patch=1
          IFS='.' read -r major minor patch <<< "$current_version"
          # Increment patch version
          new_patch=$((patch + 1))
          new_version="${major}.${minor}.${new_patch}"
          new_tag="v${new_version}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version: $new_tag (from v$current_version)"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calc_version.outputs.new_tag }}
          name: Release ${{ steps.calc_version.outputs.new_tag }}
          body: |
            🎉 自动发布版本 ${{ steps.calc_version.outputs.new_tag }}
            
            ## 更新内容
            最新提交: ${{ github.event.head_commit.message }}
            
            ## 如何更新
            ### VPS一键更新（推荐）
            #### 方式1：Telegram机器人更新
            1. 打开Telegram机器人
            2. 发送 `/start`
            3. 点击 "🛡️ 版本信息"
            4. 点击 "🔄 点击更新至最新版本"
            
            #### 方式2：命令行更新
            ```bash
            bash <(wget -qO- https://raw.githubusercontent.com/tony-wang1990/Wang-Detective-2/main/scripts/install.sh)
            ```
            
            ## 项目地址
            https://github.com/tony-wang1990/Wang-Detective-2
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
