services:
  watcher:
    image: docker:27-cli
    container_name: king-detective-watcher
    restart: always
    command: sh /scripts/watcher.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app/king-detective
      - ./scripts/watcher.sh:/scripts/watcher.sh:ro
    environment:
      - TZ=Asia/Shanghai
      - KING_DETECTIVE_GITHUB_REPOSITORY=${KING_DETECTIVE_GITHUB_REPOSITORY:-tony-wang1990/Wang-Detective}
      - KING_DETECTIVE_GITHUB_BRANCH=${KING_DETECTIVE_GITHUB_BRANCH:-main}
      - KING_DETECTIVE_IMAGE=${KING_DETECTIVE_IMAGE:-ghcr.io/tony-wang1990/wang-detective:main}
    networks:
      - app-network

  king-detective:
    image: ${KING_DETECTIVE_IMAGE:-ghcr.io/tony-wang1990/wang-detective:main}
    container_name: king-detective
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - OPS_SSH_SECRET_KEY=${OPS_SSH_SECRET_KEY:-${ADMIN_PASSWORD:-admin123456}}
      - SERVER_ADDRESS=${SERVER_ADDRESS:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-9527}
      - KING_DETECTIVE_GITHUB_REPOSITORY=${KING_DETECTIVE_GITHUB_REPOSITORY:-tony-wang1990/Wang-Detective}
      - KING_DETECTIVE_GITHUB_BRANCH=${KING_DETECTIVE_GITHUB_BRANCH:-main}
      # JVM defaults for 1C/1G VPS. Tier 1 compilation favors startup latency for this I/O-heavy service.
      - "JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS:--Xms96m -Xmx384m -XX:MaxMetaspaceSize=192m -XX:ActiveProcessorCount=1 -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Dfile.encoding=UTF-8 -Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8 -Djava.net.preferIPv4Stack=true -Dspring.jmx.enabled=false}"
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_BOT_CHAT_ID=${TELEGRAM_BOT_CHAT_ID:-${TELEGRAM_CHAT_ID:-}}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-king_detective_bot}
      - TELEGRAM_STARTUP_DELAY_SECONDS=${TELEGRAM_STARTUP_DELAY_SECONDS:-20}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "9527:9527"
    volumes:
      - ./application.yml:/app/king-detective/application.yml:ro
      - ./data:/app/king-detective/data
      - ./keys:/app/king-detective/keys
      - ./backups:/app/king-detective/backups
      - ./scripts:/app/king-detective/scripts:ro
      - ./logs:/var/log
      - ./runtime:/app/king-detective/runtime
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9527/actuator/health/liveness | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15m

networks:
  app-network:
    driver: bridge
